<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background with claymorphism -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <rect width="48" height="24" rx="12" fill="url(#shine)"/>
  <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="11.25" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Network / org-chart icon (white) -->
  <!-- Top node -->
  <circle cx="24" cy="10" r="4" fill="white" opacity="0.95"/>
  <!-- Bottom-left node -->
  <circle cx="12" cy="36" r="4" fill="white" opacity="0.85"/>
  <!-- Bottom-right node -->
  <circle cx="36" cy="36" r="4" fill="white" opacity="0.85"/>

  <!-- Connecting lines -->
  <line x1="24" y1="14" x2="12" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="14" x2="36" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="12" y1="36" x2="36" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
